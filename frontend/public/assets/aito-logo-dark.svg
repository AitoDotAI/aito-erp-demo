<?xml version="1.0" encoding="UTF-8"?>
<!--  Aito logo · dark variant — "ai" in dark navy, "to" in Sunset Purple, ".." in deep purple  -->
<svg xmlns="http://www.w3.org/2000/svg"
     width="380" height="160" viewBox="0 0 380 160" aria-labelledby="title">
  <title>Aito logo</title>

  <text x="20" y="135"
        font-family="Inter, 'Helvetica Neue', Arial, sans-serif"
        font-size="150" font-weight="700"
        fill="#0c0f41">ai</text>

  <text x="150" y="135"
        font-family="Inter, 'Helvetica Neue', Arial, sans-serif"
        font-size="150" font-weight="700"
        fill="#9B69FF">to</text>

  <text x="290" y="135"
        font-family="Inter, 'Helvetica Neue', Arial, sans-serif"
        font-size="150" font-weight="700"
        fill="#37336B">..</text>
</svg>
