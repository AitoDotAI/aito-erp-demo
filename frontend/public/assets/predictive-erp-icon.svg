<?xml version="1.0" encoding="UTF-8"?>
<!--
  Predictive ERP — icon-only mark.
  Gold rounded square with three horizontal bars (suggesting the
  ledger/queue structure that drives most ERP screens). Pairs with an
  HTML wordmark in the sidebar; matches the Predictive Ledger demo's
  visual language so the family of demos reads as related.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     width="48" height="48" viewBox="0 0 48 48"
     aria-labelledby="title">
  <title id="title">Predictive ERP</title>
  <rect x="0" y="0" width="48" height="48" rx="9" fill="#d4a030"/>
  <rect x="11" y="14" width="26" height="3.5" rx="1.75" fill="#0c0f0a"/>
  <rect x="11" y="22.25" width="26" height="3.5" rx="1.75" fill="#0c0f0a"/>
  <rect x="11" y="30.5"  width="19" height="3.5" rx="1.75" fill="#0c0f0a"/>
</svg>
